<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Pine Point Tree Service</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/analytics.js"></script>
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      background: var(--color-black);
      color: var(--color-white);
      font-family: var(--font-family);
    }
    .error-page__inner {
      max-width: 520px;
      text-align: center;
    }
    .error-page__logo {
      display: inline-block;
      margin-bottom: 32px;
    }
    .error-page__logo img {
      width: 120px;
      height: auto;
    }
    .error-page__code {
      font-size: 0.875rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color-light-gray);
      margin-bottom: 12px;
    }
    .error-page__title {
      font-size: 2.25rem;
      font-weight: 800;
      margin: 0 0 16px;
      line-height: 1.1;
      color: var(--color-white);
    }
    .error-page__lead {
      color: var(--color-light-gray);
      font-size: 1.0625rem;
      line-height: 1.6;
      margin: 0 0 32px;
    }
    .error-page__actions {
      display: grid;
      gap: 12px;
    }
    @media (min-width: 480px) {
      .error-page__actions {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-page__inner">
      <a href="/" class="error-page__logo">
        <img src="/images/logo-white-clean.png" alt="Pine Point Tree Service">
      </a>
      <div class="error-page__code">Error 404</div>
      <h1 class="error-page__title">We couldn't find that page.</h1>
      <p class="error-page__lead">
        The link may be old or mistyped. Head back to the homepage, request a free estimate, or just call us — we're happy to help directly.
      </p>
      <div class="error-page__actions">
        <a href="/" class="btn btn-primary btn-lg">Back to Homepage</a>
        <a href="tel:+17742622145" class="btn btn-outline btn-lg">Call (774) 262-2145</a>
      </div>
    </div>
  </main>
</body>
</html>
